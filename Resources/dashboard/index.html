<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>term-mesh Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #00adb5;
    --danger: #e94560;
    --success: #00c897;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    overflow-x: hidden;
  }
  .header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .header .status {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .card h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card.full { grid-column: 1 / -1; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-label { color: var(--text-dim); }
  .stat-value { font-variant-numeric: tabular-nums; font-weight: 500; }
  .chart-container {
    position: relative;
    height: 150px;
  }
  /* Watched projects */
  .project-tag {
    display: inline-block;
    background: rgba(0, 173, 181, 0.15);
    border: 1px solid rgba(0, 173, 181, 0.3);
    border-radius: 4px;
    padding: 2px 8px;
    margin: 2px 4px 2px 0;
    font-size: 11px;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--accent);
  }
  .project-tag .remove-btn {
    cursor: pointer;
    color: var(--text-dim);
    margin-left: 4px;
  }
  .project-tag .remove-btn:hover { color: var(--danger); }
  /* Heatmap */
  .heatmap-bar {
    display: flex;
    align-items: center;
    padding: 3px 0;
    gap: 8px;
  }
  .heatmap-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    color: var(--text-dim);
  }
  .heatmap-meter {
    width: 100px;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .heatmap-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .heatmap-count {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 30px;
    text-align: right;
  }
  /* Alerts */
  .alert {
    background: rgba(233, 69, 96, 0.15);
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .alert .pid { color: var(--danger); font-weight: 600; }
  /* Event log */
  .event-log {
    max-height: 160px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 11px;
  }
  .event-log .event {
    padding: 2px 0;
    display: flex;
    gap: 8px;
  }
  .event .time { color: var(--text-dim); min-width: 65px; }
  .event .kind { min-width: 48px; }
  .event .kind.create { color: var(--success); }
  .event .kind.modify { color: var(--accent); }
  .event .kind.remove { color: var(--danger); }
  .event .path { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* No data */
  .empty { color: var(--text-dim); font-style: italic; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>term-mesh</h1>
  <div id="session-picker"></div>
  <span class="status" id="status">connecting...</span>
</div>

<div class="grid">
  <!-- Watched Projects (per terminal tab) -->
  <div class="card full">
    <h2>Watched Projects (per terminal tab)</h2>
    <div id="watched-projects"><div class="empty">No projects watched</div></div>
  </div>

  <!-- System Resources -->
  <div class="card">
    <h2>System</h2>
    <div id="system-stats">
      <div class="stat-row"><span class="stat-label">Memory</span><span class="stat-value" id="mem-usage">—</span></div>
      <div class="stat-row"><span class="stat-label">CPUs</span><span class="stat-value" id="cpu-count">—</span></div>
    </div>
  </div>

  <!-- Budget Alerts -->
  <div class="card">
    <h2>Budget Guard</h2>
    <div id="alerts"><div class="empty">No alerts</div></div>
  </div>

  <!-- Process Monitor Chart -->
  <div class="card full">
    <h2>Process Monitor</h2>
    <div id="process-list"></div>
    <div class="chart-container">
      <canvas id="cpuChart"></canvas>
    </div>
  </div>

  <!-- File Heatmap -->
  <div class="card">
    <h2>File Heatmap — Top 10</h2>
    <div id="heatmap"><div class="empty">No files tracked</div></div>
  </div>

  <!-- Event Log -->
  <div class="card">
    <h2>Recent Events</h2>
    <div class="event-log" id="event-log"><div class="empty">No events</div></div>
  </div>
</div>

<script>
// ── State ──
let cpuHistory = [];
const MAX_HISTORY = 30;
let cpuChart = null;
let watchedPaths = []; // tracks current watched project roots

// ── Helpers ──
function initChart() {
  const ctx = document.getElementById('cpuChart').getContext('2d');
  cpuChart = new Chart(ctx, {
    type: 'line',
    data: { labels: Array(MAX_HISTORY).fill(''), datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      scales: {
        x: { display: false },
        y: {
          beginAtZero: true, max: 100,
          ticks: { color: '#888', font: { size: 10 }, callback: v => v + '%' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      },
      plugins: {
        legend: { display: true, position: 'top',
                  labels: { color: '#888', font: { size: 10 }, boxWidth: 12 } }
      }
    }
  });
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

function formatTime(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

const COLORS = ['#00adb5','#e94560','#00c897','#f0a500','#9b59b6','#3498db','#e74c3c','#2ecc71'];

/// Convert absolute path to project-relative path.
/// e.g., "/Users/j/work/proj/src/main.rs" → "src/main.rs" if "/Users/j/work/proj" is watched.
function toRelativePath(absPath) {
  for (const wp of watchedPaths) {
    if (absPath.startsWith(wp + '/')) {
      return absPath.slice(wp.length + 1);
    }
  }
  // Fallback: show last 3 segments
  return absPath.split('/').slice(-3).join('/');
}

/// Extract short project name from a watched path.
function projectName(path) {
  const parts = path.split('/');
  return parts[parts.length - 1] || path;
}

// ── Data Update ──

function updateMonitor(data) {
  if (!data) return;
  document.getElementById('status').textContent = 'live';

  // System stats
  document.getElementById('mem-usage').textContent =
    formatBytes(data.used_memory_bytes) + ' / ' + formatBytes(data.total_memory_bytes);
  document.getElementById('cpu-count').textContent = data.cpu_count + ' cores';

  // Process list
  const procEl = document.getElementById('process-list');
  if (data.processes.length === 0) {
    procEl.innerHTML = '<div class="empty">No tracked processes</div>';
  } else {
    procEl.innerHTML = data.processes.map(p =>
      `<div class="stat-row">
        <span class="stat-label">PID ${p.pid} (${p.name})</span>
        <span class="stat-value">${p.cpu_percent.toFixed(1)}% · ${formatBytes(p.memory_bytes)}</span>
      </div>`
    ).join('');
  }

  // CPU chart
  if (cpuChart) {
    cpuHistory.push(data.processes.map(p => ({ pid: p.pid, name: p.name, cpu: p.cpu_percent })));
    if (cpuHistory.length > MAX_HISTORY) cpuHistory.shift();

    const allPids = [...new Set(cpuHistory.flatMap(h => h.map(p => p.pid)))];
    cpuChart.data.labels = Array(cpuHistory.length).fill('');
    cpuChart.data.datasets = allPids.map((pid, i) => ({
      label: `PID ${pid}`,
      data: cpuHistory.map(h => { const p = h.find(x => x.pid === pid); return p ? p.cpu : 0; }),
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: COLORS[i % COLORS.length] + '20',
      borderWidth: 1.5, tension: 0.3, fill: true, pointRadius: 0,
    }));
    cpuChart.update('none');
  }

  // Alerts
  const alertsEl = document.getElementById('alerts');
  if (data.alerts.length === 0) {
    alertsEl.innerHTML = '<div class="empty">No alerts</div>';
  } else {
    alertsEl.innerHTML = data.alerts.map(a =>
      `<div class="alert">
        <span class="pid">PID ${a.pid}</span> ${a.kind} at ${a.value.toFixed(1)}
        (threshold: ${a.threshold.toFixed(1)})
      </div>`
    ).join('');
  }
}

function updateHeatmap(data) {
  if (!data) return;

  // Update watched paths state
  watchedPaths = data.watched_paths || [];

  // Watched projects display
  const wpEl = document.getElementById('watched-projects');
  if (watchedPaths.length === 0) {
    wpEl.innerHTML = '<div class="empty">No projects watched — open terminal tabs to auto-watch project directories</div>';
  } else {
    wpEl.innerHTML = watchedPaths.map(p =>
      `<span class="project-tag" title="${p}">${projectName(p)}</span>`
    ).join('');
  }

  // Heatmap — show project-relative paths
  const heatmapEl = document.getElementById('heatmap');
  if (data.top_files.length === 0) {
    heatmapEl.innerHTML = '<div class="empty">No file activity</div>';
  } else {
    const maxCount = Math.max(...data.top_files.map(f => f.event_count), 1);
    heatmapEl.innerHTML = data.top_files.map(f => {
      const pct = (f.event_count / maxCount * 100).toFixed(0);
      const hue = Math.max(0, 120 - (f.event_count / maxCount) * 120);
      const relPath = toRelativePath(f.path);
      return `<div class="heatmap-bar">
        <span class="heatmap-name" title="${f.path}">${relPath}</span>
        <div class="heatmap-meter">
          <div class="heatmap-fill" style="width:${pct}%;background:hsl(${hue},70%,50%)"></div>
        </div>
        <span class="heatmap-count">${f.event_count}</span>
      </div>`;
    }).join('');
  }

  // Event log — show project-relative paths
  const logEl = document.getElementById('event-log');
  if (data.recent_events.length === 0) {
    logEl.innerHTML = '<div class="empty">No events</div>';
  } else {
    logEl.innerHTML = data.recent_events.slice(0, 30).map(e => {
      const relPath = toRelativePath(e.path);
      return `<div class="event">
        <span class="time">${formatTime(e.timestamp_ms)}</span>
        <span class="kind ${e.kind}">${e.kind}</span>
        <span class="path" title="${e.path}">${relPath}</span>
      </div>`;
    }).join('');
  }
}

// ── Init ──
initChart();
</script>
</body>
</html>
